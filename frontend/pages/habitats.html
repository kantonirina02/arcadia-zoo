<div class="container py-4">
  <header class="text-center mb-5" id="habitats-header">
    <h1 class="display-5 fw-bold text-success font-serif">
      Les Biotopes d'Arcadia
    </h1>
    <p class="text-muted mx-auto" style="max-width: 600px">
      Explorez nos écosystèmes reproduits fidèlement pour le bien-être de nos
      pensionnaires. Click sur un habitat pour l'explorer en détail.
    </p>
  </header>

  <div class="mb-4 d-none" id="back-to-habitats-btn-container">
    <button class="btn btn-outline-success" id="btn-back-habitats">
      <i class="bi bi-arrow-left"></i> Retour aux biotopes
    </button>
  </div>

  <div id="habitats-main-container" class="row g-4 justify-content-center">
    <div class="text-center py-5">
      <div class="spinner-border text-success" role="status">
        <span class="visually-hidden">Chargement des biotopes...</span>
      </div>
    </div>
  </div>
</div>
