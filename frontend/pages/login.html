<div class="row justify-content-center">
  <div class="col-12 col-md-6 col-lg-5">
    <div class="card shadow-sm border-0">
      <div class="card-body p-5">
        <div class="text-center mb-4">
          <i class="bi bi-person-circle text-success" style="font-size: 3rem;"></i>
          <h2 class="h4 mt-2 font-outfit text-primary">Connexion au Zoo</h2>
          <p class="text-muted small">Espace réservé au personnel (Admin, Employés, Vétérinaires).</p>
        </div>

        <div id="login-alert" class="alert d-none" role="alert"></div>

        <form id="login-form" novalidate>
          <div class="mb-3">
            <label for="login-email" class="form-label text-secondary fw-semibold">Adresse Email</label>
            <input type="email" class="form-control" id="login-email" required placeholder="nom@arcadia-zoo.fr">
            <div class="invalid-feedback">
              Veuillez entrer une adresse email valide.
            </div>
          </div>
          <div class="mb-4">
            <label for="login-password" class="form-label text-secondary fw-semibold">Mot de passe</label>
            <input type="password" class="form-control" id="login-password" required placeholder="Votre mot de passe">
            <div class="invalid-feedback">
              Veuillez entrer votre mot de passe.
            </div>
          </div>
          <div class="d-grid">
            <button type="submit" class="btn btn-success" id="btn-login">
              <i class="bi bi-box-arrow-in-right me-2"></i> Se Connecter
            </button>
          </div>
        </form>
      </div>
    </div>
  </div>
</div>
