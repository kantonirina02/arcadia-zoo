security:
    # 1. Algorithme de hachage moderne recommandé par l'ANSSI
    password_hashers:
        Symfony\Component\Security\Core\User\PasswordAuthenticatedUserInterface: "auto"

    # 2. Déclaration du fournisseur de données utilisateurs (Base relationnelle MySQL)
    providers:
        app_user_provider:
            entity:
                class: App\Entity\Utilisateur
                property: username

    # 3. Définition des pare-feux de sécurité (Stateless pour architecture SPA)
    firewalls:
        dev:
            pattern: ^/(_profiler|_wdt)/
            security: false

        # Pare-feu de connexion : Vérifie les identifiants et génère le token JWT[cite: 1]
        login:
            pattern: ^/api/auth/login
            stateless: true
            json_login:
                check_path: /api/auth/login
                username_path: username
                password_path: password
                success_handler: lexik_jwt_authentication.handler.authentication_success
                failure_handler: lexik_jwt_authentication.handler.authentication_failure

        # Pare-feu API général : Intercepte le token dans les requêtes entrantes[cite: 1]
        api:
            pattern: ^/api
            stateless: true
            jwt: ~

    # 4. Règles d'accès strictes (Autorisations RBAC par rôle métier)[cite: 1]
    access_control:
        # --- ROUTES PUBLIQUES (Accessibles par les visiteurs) ---[cite: 1]
        - { path: ^/api/services, roles: PUBLIC_ACCESS, methods: [GET] }
        - { path: ^/api/habitats, roles: PUBLIC_ACCESS, methods: [GET] }
        - {
              path: ^/api/reviews/validated,
              roles: PUBLIC_ACCESS,
              methods: [GET],
          }
        - { path: ^/api/reviews, roles: PUBLIC_ACCESS, methods: [POST] }
        - { path: ^/api/contact, roles: PUBLIC_ACCESS, methods: [POST] }
        - { path: ^/api/stats/animal, roles: PUBLIC_ACCESS, methods: [POST] }
        - { path: ^/api/auth/login, roles: PUBLIC_ACCESS }

        # --- ROUTES PRIVÉES SÉCURISÉES (Personnel du Zoo d'Arcadia) ---[cite: 1]
        - { path: ^/api/admin, roles: ROLE_ADMIN }
        - { path: ^/api/employe, roles: ROLE_EMPLOYE }
        - { path: ^/api/veterinaire, roles: ROLE_VETERINAIRE }

# Configuration de test optimisée pour de meilleures performances d'exécution[cite: 1]
when@test:
    security:
        password_hashers:
            Symfony\Component\Security\Core\User\PasswordAuthenticatedUserInterface:
                algorithm: auto
                cost: 4 # Valeur minimale pour bcrypt[cite: 1]
                time_cost: 3 # Valeur minimale pour argon[cite: 1]
                memory_cost: 10 # Valeur minimale pour argon[cite: 1]
