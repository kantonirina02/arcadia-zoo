services:
  # 1. Serveur Web (Nginx) pour le Backend API
  web:
    image: nginx:alpine
    container_name: arcadia_web
    ports:
      - '8080:80'
    volumes:
      - ./backend:/var/www/backend
      - ./frontend:/var/www/frontend
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf
    depends_on:
      - php
    networks:
      - arcadia_network

  # 2. Moteur PHP (PHP-FPM) pour Symfony
  php:
    build:
      context: ./docker/php
      dockerfile: Dockerfile
    container_name: arcadia_php
    volumes:
      - ./backend:/var/www/backend
      - ./frontend:/var/www/frontend
    networks:
      - arcadia_network

  # 3. Base de données relationnelle (MySQL)
  mysql:
    image: mysql:8.0
    container_name: arcadia_mysql
    command: --default-authentication-plugin=mysql_native_password --skip-name-resolve
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: root_secure_password
      MYSQL_DATABASE: arcadia_db
      MYSQL_USER: arcadia_user
      MYSQL_PASSWORD: arcadia_password
    ports:
      - '3306:3306'
    volumes:
      - db_data:/var/lib/mysql
    networks:
      - arcadia_network

  # 4. Base de données NoSQL (MongoDB pour les Statistiques de clics - US 11)
  mongodb:
    image: mongo:latest
    container_name: arcadia_mongodb
    restart: always
    environment:
      MONGO_INITDB_ROOT_USERNAME: admin
      MONGO_INITDB_ROOT_PASSWORD: mongo_secure_password
    ports:
      - '27017:27017'
    volumes:
      - mongo_data:/data/db
    networks:
      - arcadia_network

networks:
  arcadia_network:
    driver: bridge

volumes:
  db_data:
  mongo_data:
